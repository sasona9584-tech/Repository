<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בדיקת קריאה אוטומטית</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button.record {
            background-color: #e74c3c;
        }
        button.record:hover {
            background-color: #c0392b;
        }
        button.recording {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .grid-output {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        .word-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            position: relative;
        }
        /* צבעי סימונים לפי הכללים */
        .status-correct { border-color: #2ecc71; background-color: #eafaf1; }
        .status-error-severe { border-color: #e74c3c; background-color: #fdedec; }
        .status-error-light { border-color: #f39c12; background-color: #fef9e7; }
        .status-omitted { border-color: #95a5a6; background-color: #f2f4f4; opacity: 0.6; }
        
        .status-label {
            font-size: 11px;
            display: block;
            margin-top: 5px;
            color: #666;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מערכת בדיקת קריאה אוטומטית</h1>

    <!-- שלב א: הזנת מילים -->
    <div class="section">
        <label for="expectedText">הזן את רשימת המילים המקורית של המבדק (מופרדות ברווחים או פסיקים):</label>
        <textarea id="expectedText" placeholder="לדוגמה: לא מי בא זאת דק שוב גנן צל"></textarea>
    </div>

    <!-- שלב ב: הקלטה או שמע -->
    <div class="section">
        <label>הקלטת קריאת התלמיד:</label>
        <div class="controls">
            <button id="recordBtn" class="record">התחל הקלטה</button>
            <button id="analyzeBtn">הפעל ניתוח והשוואה</button>
        </div>
        <p id="statusMsg" style="color: #7f8c8d; font-style: italic; margin-top: 10px;"></p>
    </div>

    <!-- שלב ג: תצוגת תוצאות מסומנת -->
    <div class="section">
        <label>תוצאות הניתוח האוטומטי:</label>
        <div id="outputGrid" class="grid-output">
            <p style="color: #95a5a6;">הזן מילים, לחץ על ניתוח כדי לראות את הסימונים.</p>
        </div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const recordBtn = document.getElementById('recordBtn');
    const statusMsg = document.getElementById('statusMsg');
    const expectedTextAudio = document.getElementById('expectedText');
    const outputGrid = document.getElementById('outputGrid');
    const analyzeBtn = document.getElementById('analyzeBtn');

    // מנגנון הקלטה בסיסי בדפדפן
    recordBtn.addEventListener('click', async () => {
        if (!isRecording) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("הדפדפן שלך אינו תומך בהקלטת שמע.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    statusMsg.innerText = "ההקלטה הסתיימה בהצלחה. מוכן לניתוח.";
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "עצור הקלטה";
                recordBtn.classList.add('recording');
                statusMsg.innerText = "מקליט כעת... הקשב לילד קורא.";
            } catch (err) {
                console.error("שגיאה בגישה למיקרופון:", err);
                alert("לא ניתן לגשת למיקרופון.");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "התחל הקלטה";
            recordBtn.classList.remove('recording');
        }
    });

    // מנוע השוואה סימולטיבי (ייעשה שימוש ב-API לתמלול מלא בשלב הבא)
    analyzeBtn.addEventListener('click', () => {
        const originalText = expectedTextAudio.value.trim();
        if (!originalText) {
            alert("אנא הזן את מילות המבדק תחילה.");
            return;
        }

        const expectedWords = originalText.split(/[\s,]+/).filter(w => w.length > 0);
        
        // סימולציה זמנית של תמלול קריאה (כדי להראות את ויזואליות הסימונים)
        // בשלב הבא, המילים כאן יגיעו ישירות מה-API של תמלול השמע
        outputGrid.innerHTML = '';

        expectedWords.forEach((word, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerText = word;

            const label = document.createElement('span');
            label.className = 'status-label';

            // הדמיה רנדומלית של שגיאות לפי החוקים לצורך תצוגה ראשונית בפרויקט
            if (index === 2) { 
                card.classList.add('status-error-severe');
                label.innerText = 'שגיאה חמורה';
            } else if (index === 4) {
                card.classList.add('status-omitted');
                label.innerText = 'השמטה';
            } else if (index === 6) {
                card.classList.add('status-error-light');
                label.innerText = 'שגיאה קלה';
            } else {
                card.classList.add('status-correct');
                label.innerText = 'תקין';
            }

            card.appendChild(label);
            outputGrid.appendChild(card);
        });
    });
</script>

</body>
</html>
